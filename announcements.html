<div id="announcements"></div>

<script>

fetch("https://opensheet.elk.sh/1b7bf0B0idhG2SJymtebBdZIkHuCbhOmYbeoUukcMxZI/Sheet1")
.then(res => res.json())
.then(data => {

let output = "";

data.forEach(row => {

output += `
<div style="
background:#f4f4f4;
margin:10px;
padding:15px;
border-radius:10px;
">

<b>${row.Date}</b><br>
${row.Announcement}

</div>
`;

});

document.getElementById("announcements").innerHTML = output;

})
.catch(err => {
document.getElementById("announcements").innerHTML = "Unable to load announcements.";
console.error(err);
});

</script>
