<div id="announcements"></div>

<script>
const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-REPLACE_THIS_WITH_YOURS/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

    const rows = data.split("\n").slice(1);

    let html = "";

    rows.forEach(row => {

        const cols = row.split(",");

        const title = cols[0];
        const message = cols[1];
        const date = cols[2];
        const active = cols[3];

        if(active === "TRUE"){

            html += `
            <div style="
            border:1px solid #ccc;
            padding:15px;
            margin:10px;
            border-radius:10px;
            background:#fafafa;
            ">
                <h3>${title}</h3>
                <p>${message}</p>
                <small>${date}</small>
            </div>
            `;
        }

    });

    document.getElementById("announcements").innerHTML = html;

});
</script>
